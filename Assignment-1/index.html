<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mission Control</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>MISSION CONTROL</h1>

    <div class="panel">
        <button id="agentBtn">Agent Type</button>
        <span id="agentDisplay">---</span>
    </div>

    <div class="panel">
        <button id="locationBtn">Mission Location</button>
        <span id="locationDisplay">---</span>
    </div>

    <div class="panel">
        <button id="weaponBtn">Weapon Loadout</button>
        <span id="weaponDisplay">---</span>
    </div>

    <div class="panel">
        <button id="objectiveBtn">Objective</button>
        <span id="objectiveDisplay">---</span>
    </div>

    <div class="panel">
        <button id="riskBtn">Risk Level</button>
        <span id="riskDisplay">---</span>
    </div>

    <button id="launchBtn" class="launch">LAUNCH MISSION</button>
    <button id="resetBtn" class="reset">RESET</button>

    <h2>Mission Briefing</h2>
    <p id="missionOutput">Awaiting input...</p>

    <script src="script.js"></script>
</body>
</html>
