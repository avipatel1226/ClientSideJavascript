<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pizza Maker</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer></script>
</head>
<body>

    <h1>Pizza Maker</h1>

    <!-- Student info gets added with JS -->
    <p id="studentInfo"></p>

    <form id="pizzaForm">

        <label>
            Your Name:
            <input type="text" id="customerName">
        </label>

        <label>
            Pizza Size:
            <select id="pizzaSize">
                <option value="">Select size</option>
                <option value="Small">Small</option>
                <option value="Medium">Medium</option>
                <option value="Large">Large</option>
            </select>
        </label>

        <label> 
    Crust Type:
    <select id="crustType">
        <option value="">Choose crust</option>
        <option value="Thin">Thin</option>
        <option value="Regular">Regular</option>
        <option value="Stuffed">Stuffed</option>
        <option value="Cheese Burst">Cheese Burst</option>
        <option value="Whole Wheat">Whole Wheat</option>
    </select>
</label>
<fieldset>
            <legend>Toppings</legend>
            <label><input type="checkbox" value="Pepperoni" class="topping"> Pepperoni</label>
            <label><input type="checkbox" value="Mushrooms" class="topping"> Mushrooms</label>
            <label><input type="checkbox" value="Onions" class="topping"> Onions</label>
            <label><input type="checkbox" value="Green Peppers" class="topping"> Green Peppers</label>
            <label><input type="checkbox" value="Extra Cheese" class="topping"> Extra Cheese</label>
        </fieldset>

        <label>
            Special Instructions:
            <textarea id="specialInstructions"></textarea>
        </label>

        <button type="submit">Order Pizza</button>
    </form>

    <h2>Your Order</h2>
    <p id="orderOutput"></p>
